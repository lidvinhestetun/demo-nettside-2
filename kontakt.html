<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt – Rørlegger AS</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">
                <span class="logo-mark">R</span>
                <span class="logo-text">Rørlegger AS</span>
            </div>

            <nav class="main-nav">
                <a href="index.html">Hjem</a>
                <a href="tjenester.html">Tjenester</a>
                <a href="om-oss.html">Om oss</a>
                <a href="prosjekter.html">Prosjekter</a>
                <a href="priser.html">Priser</a>
                <a href="faq.html">FAQ</a>
                <a href="bestill-befaring.html">Bestill befaring</a>
                <a href="kontakt.html" class="nav-cta active">Kontakt</a>
            </nav>
        </div>
    </header>

    <main>

        <section class="sub-hero">
            <div class="container">
                <h1>Kontakt oss</h1>
                <p>Ta kontakt for spørsmål, tilbud eller akutte oppdrag.</p>
            </div>
        </section>

        <section class="section">
            <div class="container" style="max-width: 650px;">

                <div class="card">
                    <h3>Kontaktinformasjon</h3>
                    <p><strong>Telefon:</strong> 22 22 22 22</p>
                    <p><strong>E‑post:</strong> post@rorleggeras.no</p>
                    <p><strong>Adresse:</strong> Eksempelveien 12, 0456 Oslo</p>
                </div>

                <div class="card" style="margin-top: 2rem;">
                    <h3>Send oss en melding</h3>

                    <form style="display: grid; gap: 1rem; margin-top: 1rem;">

                        <div>
                            <label>Navn</label>
                            <input type="text" placeholder="Ditt navn" style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ccc;">
                        </div>

                        <div>
                            <label>E‑post</label>
                            <input type="email" placeholder="din@epost.no" style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ccc;">
                        </div>

                        <div>
                            <label>Melding</label>
                            <textarea placeholder="Hva kan vi hjelpe deg med?" rows="4" style="width:100%; padding:0.7rem; border-radius:8px; border:1px solid #ccc;"></textarea>
                        </div>

                        <button class="btn btn-primary" type="submit">Send melding</button>

                    </form>
                </div>

            </div>
        </section>

    </main>

</body>
</html>
